<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 对话工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --md-primary: #6750A4;
            --md-primary-dark: #4F378B;
            --md-primary-light: #EADDFF;
            --md-on-primary: #FFFFFF;
            --md-secondary: #625B71;
            --md-surface: #FFFFFF;
            --md-surface-variant: #F5F5F5;
            --md-on-surface: #1C1B1F;
            --md-on-surface-variant: #49454F;
            --md-outline: #E0E0E0;
            --md-background: #FFFFFF;
            
            --sidebar-width: 260px;
            --sidebar-bg: #F9F9F9;
            --border-radius: 12px;
            --font-body: clamp(0.875rem, 4vw, 1rem);
            --font-title: clamp(1.25rem, 6vw, 1.75rem);
            --font-button: clamp(0.75rem, 3.5vw, 0.875rem);
            --font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body.dark {
            --md-surface: #1E1E1E;
            --md-surface-variant: #2C2C2C;
            --md-on-surface: #E6E1E5;
            --md-on-surface-variant: #CAC4D0;
            --md-outline: #3E3E3E;
            --md-background: #1E1E1E;
            --sidebar-bg: #2C2C2C;
        }

        body {
            background-color: var(--md-background);
            font-family: var(--font-family);
            font-size: var(--font-body);
            color: var(--md-on-surface);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--md-outline);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            z-index: 20;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--md-outline);
        }

        .new-chat-btn {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            border-radius: 32px;
            padding: 10px 16px;
            width: 100%;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--md-primary-dark);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--md-on-surface-variant);
            transition: background 0.2s;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: var(--md-surface-variant);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--md-outline);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-toggle {
            background: var(--md-surface-variant);
            border: none;
            border-radius: 20px;
            padding: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--md-on-surface);
        }

        .config-panel {
            background: var(--md-surface);
            border-radius: 12px;
            padding: 12px;
            margin-top: 4px;
            border: 1px solid var(--md-outline);
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .config-panel.show {
            display: flex;
        }

        .config-panel input, .config-panel select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--md-outline);
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
            font-size: 0.8rem;
        }

        .theme-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .theme-chip {
            background: var(--md-surface-variant);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid var(--md-outline);
        }

        .theme-chip.active {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border-color: var(--md-primary);
        }

        /* 主聊天区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--md-surface);
            position: relative;
        }

        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--md-outline);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--md-surface);
        }

        .menu-icon {
            display: none;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--md-on-surface);
        }

        .header-title {
            font-weight: 500;
            font-size: 1rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--md-on-surface);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .assistant .message-content {
            background: var(--md-surface-variant);
            color: var(--md-on-surface-variant);
            border-bottom-left-radius: 4px;
        }

        .user .message-content {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border-bottom-right-radius: 4px;
        }

        .input-wrapper {
            padding: 0 24px 24px 24px;
            background: var(--md-surface);
            border-top: 1px solid var(--md-outline);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--md-surface-variant);
            border-radius: 32px;
            padding: 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            border: 1px solid var(--md-outline);
        }

        .input-container:focus-within {
            outline: 2px solid var(--md-primary);
        }

        .input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-family: var(--font-family);
            font-size: var(--font-body);
            resize: none;
            outline: none;
            color: var(--md-on-surface);
            max-height: 150px;
            min-height: 44px;
        }

        .send-button {
            background: var(--md-primary);
            border: none;
            border-radius: 32px;
            padding: 8px 16px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--md-on-primary);
            transition: 0.2s;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 30;
                box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-icon {
                display: block;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .chat-messages {
                padding: 16px;
            }
            .input-wrapper {
                padding: 0 16px 16px 16px;
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 25;
                display: none;
            }
            .overlay.active {
                display: block;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-row {
            animation: fadeSlideUp 0.2s ease-out;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">新对话</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-item">当前对话</div>
        </div>
        <div class="sidebar-footer">
            <button class="config-toggle" id="configToggleBtn">设置</button>
            <div class="config-panel" id="configPanel">
                <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" autocomplete="off">
                <select id="modelSelect">
                    <option value="deepseek-chat">DeepSeek-V3 (快速)</option>
                    <option value="deepseek-reasoner">DeepSeek-R1 (深度推理)</option>
                </select>
                <div class="theme-row" id="themeSelector">
                    <div class="theme-chip" data-theme="purple">经典紫</div>
                    <div class="theme-chip" data-theme="blue">湛蓝</div>
                    <div class="theme-chip" data-theme="green">翠绿</div>
                    <div class="theme-chip" data-theme="orange">暖阳橙</div>
                </div>
                <button id="saveSettingsBtn">保存设置</button>
                <div style="font-size:0.7rem; text-align:center;"><a href="https://platform.deepseek.com/api_keys" target="_blank">获取 API Key</a></div>
            </div>
            <!-- 新增：关于本站按钮 -->
            <button class="config-toggle" id="aboutBtn">关于本站</button>
            <button class="config-toggle" id="darkModeBtn">深色模式</button>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-icon" id="menuIcon">☰</button>
            <div class="header-title">DeepSeek 对话</div>
            <div class="header-actions">
                <button class="icon-btn" id="clearChatBtn">清空</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row assistant">
                <div class="message-content">你好！我是纯文字版助手。在左侧边栏设置中填入 API Key 即可开始对话。</div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <textarea id="messageInput" placeholder="发送消息..." rows="1"></textarea>
                <button class="send-button" id="sendBtn">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- DOM ----------
    const sidebar = document.getElementById('sidebar');
    const menuIcon = document.getElementById('menuIcon');
    const overlay = document.getElementById('overlay');
    const newChatBtn = document.getElementById('newChatBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const darkModeBtn = document.getElementById('darkModeBtn');
    const configToggleBtn = document.getElementById('configToggleBtn');
    const configPanel = document.getElementById('configPanel');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelSelect = document.getElementById('modelSelect');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const aboutBtn = document.getElementById('aboutBtn');
    const themeChips = document.querySelectorAll('.theme-chip');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ---------- 状态 ----------
    let messagesHistory = [];
    let isLoading = false;

    // ---------- 主题配色 ----------
    const themes = {
        purple: {
            '--md-primary': '#6750A4',
            '--md-primary-dark': '#4F378B',
            '--md-primary-light': '#EADDFF',
            '--md-on-primary': '#FFFFFF',
            '--md-secondary': '#625B71'
        },
        blue: {
            '--md-primary': '#006C8C',
            '--md-primary-dark': '#00516A',
            '--md-primary-light': '#C2E7FF',
            '--md-on-primary': '#FFFFFF',
            '--md-secondary': '#4F5B62'
        },
        green: {
            '--md-primary': '#2E6D4E',
            '--md-primary-dark': '#1E543A',
            '--md-primary-light': '#C4ECD9',
            '--md-on-primary': '#FFFFFF',
            '--md-secondary': '#4E5B55'
        },
        orange: {
            '--md-primary': '#B85C1A',
            '--md-primary-dark': '#904A10',
            '--md-primary-light': '#FFE0B5',
            '--md-on-primary': '#FFFFFF',
            '--md-secondary': '#705B4A'
        }
    };

    function applyTheme(themeName) {
        const theme = themes[themeName];
        if (!theme) return;
        const root = document.documentElement;
        for (const [key, value] of Object.entries(theme)) {
            root.style.setProperty(key, value);
        }
        localStorage.setItem('md3_theme_color', themeName);
        document.querySelectorAll('.theme-chip').forEach(chip => {
            if (chip.dataset.theme === themeName) chip.classList.add('active');
            else chip.classList.remove('active');
        });
    }

    function loadSavedTheme() {
        const savedTheme = localStorage.getItem('md3_theme_color');
        if (savedTheme && themes[savedTheme]) applyTheme(savedTheme);
        else applyTheme('purple');
    }

    // ---------- 存储 ----------
    function loadLocalData() {
        const savedKey = localStorage.getItem('deepseek_api_key');
        const savedModel = localStorage.getItem('deepseek_model');
        const savedDarkMode = localStorage.getItem('md3_dark_mode');
        if (savedKey) apiKeyInput.value = savedKey;
        if (savedModel) modelSelect.value = savedModel;
        if (savedDarkMode === 'true') {
            document.body.classList.add('dark');
            darkModeBtn.textContent = '浅色模式';
        } else {
            darkModeBtn.textContent = '深色模式';
        }
        loadSavedTheme();
    }

    function saveApiSettings() {
        const key = apiKeyInput.value.trim();
        const model = modelSelect.value;
        try {
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
            } else {
                localStorage.removeItem('deepseek_api_key');
            }
            localStorage.setItem('deepseek_model', model);
            showToast('设置已保存');
            console.log('API Key and model saved successfully');
        } catch (e) {
            console.error('保存失败', e);
            showToast('保存失败，请重试');
        }
    }

    // 增强版提示函数
    function showToast(msg, duration = 2000) {
        const oldToast = document.getElementById('dynamicToast');
        if (oldToast) oldToast.remove();
        
        const toast = document.createElement('div');
        toast.id = 'dynamicToast';
        toast.textContent = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = 'var(--md-surface-variant)';
        toast.style.color = 'var(--md-on-surface)';
        toast.style.padding = '8px 20px';
        toast.style.borderRadius = '32px';
        toast.style.fontSize = '0.85rem';
        toast.style.fontWeight = '500';
        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
        toast.style.zIndex = '1000';
        toast.style.backdropFilter = 'blur(8px)';
        toast.style.whiteSpace = 'nowrap';
        document.body.appendChild(toast);
        
        setTimeout(() => {
            if (toast && toast.parentNode) toast.remove();
        }, duration);
    }

    // ---------- 消息渲染 ----------
    function addMessageRow(role, content) {
        const messageRow = document.createElement('div');
        messageRow.className = `message-row ${role}`;
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = content;
        messageRow.appendChild(contentDiv);
        chatMessagesDiv.appendChild(messageRow);
        scrollToBottom();
        return contentDiv;
    }

    function addUserMessage(content) {
        messagesHistory.push({ role: 'user', content: content });
        addMessageRow('user', content);
    }

    function updateLastAssistantContent(content) {
        const assistantRows = chatMessagesDiv.querySelectorAll('.message-row.assistant');
        if (assistantRows.length === 0) return;
        const lastRow = assistantRows[assistantRows.length - 1];
        const contentDiv = lastRow.querySelector('.message-content');
        if (contentDiv) {
            contentDiv.textContent = content;
            scrollToBottom();
        }
    }

    function clearAllMessages() {
        chatMessagesDiv.innerHTML = '';
        messagesHistory = [];
        const welcomeMsg = '对话已清空。有什么我可以帮你的？';
        messagesHistory.push({ role: 'assistant', content: welcomeMsg });
        addMessageRow('assistant', welcomeMsg);
    }

    function scrollToBottom() {
        chatMessagesDiv.scrollTo({ top: chatMessagesDiv.scrollHeight, behavior: 'smooth' });
    }

    // ---------- API 调用 ----------
    async function callDeepSeekStream(userMessage) {
        const apiKey = localStorage.getItem('deepseek_api_key');
        if (!apiKey) {
            showToast('请先在侧边栏设置中填写 API Key');
            throw new Error('Missing API Key');
        }
        const model = localStorage.getItem('deepseek_model') || 'deepseek-chat';
        const conversation = [...messagesHistory, { role: 'user', content: userMessage }];

        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: model,
                messages: conversation,
                stream: true,
                temperature: 0.7,
                max_tokens: 2048
            })
        });

        if (!response.ok) {
            let errDetail = '';
            try {
                const errJson = await response.json();
                errDetail = errJson.error?.message || JSON.stringify(errJson);
            } catch(e) { errDetail = response.statusText; }
            throw new Error(`API 错误 (${response.status}): ${errDetail}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let fullContent = '';

        messagesHistory.push({ role: 'assistant', content: '' });
        const assistantContentDiv = addMessageRow('assistant', '');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed === 'data: [DONE]') continue;
                if (trimmed.startsWith('data: ')) {
                    try {
                        const jsonData = JSON.parse(trimmed.slice(6));
                        const delta = jsonData.choices?.[0]?.delta?.content;
                        if (delta) {
                            fullContent += delta;
                            assistantContentDiv.textContent = fullContent;
                            if (messagesHistory.length && messagesHistory[messagesHistory.length-1].role === 'assistant') {
                                messagesHistory[messagesHistory.length-1].content = fullContent;
                            }
                            scrollToBottom();
                        }
                    } catch (e) {}
                }
            }
        }
        if (fullContent === '') {
            const errorText = '（无有效回复，请重试）';
            assistantContentDiv.textContent = errorText;
            if (messagesHistory.length && messagesHistory[messagesHistory.length-1].role === 'assistant') {
                messagesHistory[messagesHistory.length-1].content = errorText;
            }
        }
        return fullContent;
    }

    async function sendMessage() {
        if (isLoading) return;
        const text = messageInput.value.trim();
        if (!text) return;

        const apiKey = localStorage.getItem('deepseek_api_key');
        if (!apiKey) {
            showToast('请先在侧边栏设置中填写 API Key');
            if (window.innerWidth <= 768) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            }
            configPanel.classList.add('show');
            return;
        }

        messageInput.value = '';
        messageInput.style.height = 'auto';
        isLoading = true;
        sendBtn.disabled = true;

        addUserMessage(text);

        try {
            await callDeepSeekStream(text);
        } catch (err) {
            console.error(err);
            const errorMsg = `请求失败：${err.message}`;
            if (messagesHistory.length && messagesHistory[messagesHistory.length-1].role === 'assistant') {
                updateLastAssistantContent(errorMsg);
                messagesHistory[messagesHistory.length-1].content = errorMsg;
            } else {
                messagesHistory.push({ role: 'assistant', content: errorMsg });
                addMessageRow('assistant', errorMsg);
            }
            showToast('通信失败，请检查 API Key 或网络');
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            // 修复：移除自动聚焦输入框，防止键盘自动弹出
            // messageInput.focus();  // 已删除
        }
    }

    function newConversation() {
        if (isLoading) {
            showToast('请等待回复结束');
            return;
        }
        clearAllMessages();
        showToast('新对话已创建');
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
    }

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark');
        darkModeBtn.textContent = isDark ? '浅色模式' : '深色模式';
        localStorage.setItem('md3_dark_mode', isDark);
    }

    function aboutSite() {
        showToast('本对话界面由 AI 生成，作者DeepSeek&寒彻');
    }

    function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }
    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }

    // 事件绑定
    menuIcon.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
    configToggleBtn.addEventListener('click', () => {
        configPanel.classList.toggle('show');
    });
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
    newChatBtn.addEventListener('click', newConversation);
    clearChatBtn.addEventListener('click', newConversation);
    darkModeBtn.addEventListener('click', toggleDarkMode);
    saveSettingsBtn.addEventListener('click', saveApiSettings);
    aboutBtn.addEventListener('click', aboutSite);
    themeChips.forEach(chip => {
        chip.addEventListener('click', () => applyTheme(chip.dataset.theme));
    });

    // 初始化
